<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Fantasy 2026</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{font-family:sans-serif;background:#0b0f19;color:white;margin:0;padding:20px}
.leaderboard-container{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{min-width:600px;width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #333}
button{padding:12px;margin:10px 0;background:#ffcc00;border:none;border-radius:6px;cursor:pointer}
.card{border:1px solid #333;padding:12px;margin:10px 0;border-radius:8px}
h2{margin-top:30px}
</style>
</head>

<body>

<h1>IPL Fantasy 2026</h1>

<button onclick="updatePoints()">🚀 Update Points & Send Notifications</button>

<div id="leaderboard"></div>
<div id="whatsapp"></div>

<script>
emailjs.init("pGolGtsvwJQG_kLpe");

const OWNERS = [
  {code:"RF", name:"Royal Falcons", person:"Nikhil", email:"nikhilkhatu10@gmail.com", phone:"919619597576"},
  {code:"BTDK", name:"Balls To De Kock", person:"Aditya", email:"aditrivedi96@gmail.com", phone:"919820477663"},
  {code:"RTTO", name:"Rice To The Occasion", person:"Neeraj", email:"neeraj.mhatre04@gmail.com", phone:"919004277836"},
  {code:"SBCC", name:"Street Bluez CC", person:"Bhavik", email:"bhavikkachalia@gmail.com", phone:"919029703386"},
  {code:"PP", name:"Powerplay Pandas", person:"Sushant", email:"sushantk2510@gmail.com", phone:"919820097750"},
  {code:"CD", name:"Cover Drivers", person:"Kevin", email:"kevintalati@gmail.com", phone:"919757095258"},
  {code:"SSK", name:"Solo Super Kings", person:"Prashant", email:"prashant.tayde.7@gmail.com", phone:"919049302500"},
  {code:"MICG", name:"MI Chya Gaavaat", person:"Sachin", email:"sachinnayak16@gmail.com", phone:"919892355758"}
];

let data = {};

async function loadData(){
  const res = await fetch("./data.json");
  data = await res.json();
  renderLeaderboard();
}

function renderLeaderboard(){
  let html = "<div class='leaderboard-container'><table>";
  html += "<tr><th>Player</th><th>Points</th></tr>";

  Object.entries(data.playerPoints["Match 1"] || {}).forEach(([p,pts])=>{
    html += `<tr><td>${p}</td><td>${pts}</td></tr>`;
  });

  html += "</table></div>";
  document.getElementById("leaderboard").innerHTML = html;
}

function generateMessage(owner){
  return `🔥 ${owner.person} bhai!

Tera team "${owner.name}" ka scene tight hai 😆

📉 Rank hil gaya hai
⭐ Star player kuch kar nahi raha
😏 Rival tujhe roast kar raha hai

Sudhar ja warna league gaya!

– IPL Fantasy System`;
}

function sendEmails(){
  OWNERS.forEach(owner=>{
    const msg = generateMessage(owner);

    emailjs.send("service_sg36yti","template_lyyr11w",{
      subject:"🔥 IPL Fantasy Update",
      message:msg,
      to_email:owner.email,
      name:owner.person
    });
  });

  console.log("✅ Emails sent");
}

function buildWhatsApp(){
  let html = "<h2>📲 WhatsApp Panel</h2>";

  const groupMsg = encodeURIComponent("🔥 IPL Fantasy update aa gaya! Sab leaderboard check karo 😎");
  html += `<div class='card'>
  <b>Group Message</b><br>
  <a href="https://wa.me/?text=${groupMsg}" target="_blank">Send to Group</a>
  </div>`;

  OWNERS.forEach(owner=>{
    const msg = encodeURIComponent(generateMessage(owner));

    html += `<div class='card'>
      <b>${owner.name}</b><br>
      <a href="https://wa.me/${owner.phone}?text=${msg}" target="_blank">
        Send on WhatsApp
      </a>
    </div>`;
  });

  document.getElementById("whatsapp").innerHTML = html;
}

function updatePoints(){
  sendEmails();
  buildWhatsApp();
}

loadData();
</script>

</body>
</html>
