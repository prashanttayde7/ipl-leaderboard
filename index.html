<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Fantasy 2026</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{font-family:sans-serif;background:#0b0f19;color:white;margin:0;padding:20px}
h1{margin-bottom:10px}
button{padding:12px;background:#ffcc00;border:none;border-radius:6px;cursor:pointer;margin-bottom:20px}
.leaderboard{overflow-x:auto}
table{min-width:600px;width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #333}
.card{border:1px solid #333;padding:10px;margin:10px 0;border-radius:8px}
</style>
</head>

<body>

<h1>IPL Fantasy 2026</h1>

<button onclick="runUpdate()">🚀 Update Points & Send Notifications</button>

<div class="leaderboard" id="leaderboard"></div>
<div id="whatsapp"></div>

<script>
emailjs.init("pGolGtsvwJQG_kLpe");

const OWNERS = [
  {name:"Royal Falcons", person:"Nikhil", email:"nikhilkhatu10@gmail.com", phone:"919619597576"},
  {name:"Balls To De Kock", person:"Aditya", email:"aditrivedi96@gmail.com", phone:"919820477663"},
  {name:"Rice To The Occasion", person:"Neeraj", email:"neeraj.mhatre04@gmail.com", phone:"919004277836"},
  {name:"Street Bluez CC", person:"Bhavik", email:"bhavikkachalia@gmail.com", phone:"919029703386"},
  {name:"Powerplay Pandas", person:"Sushant", email:"sushantk2510@gmail.com", phone:"919820097750"},
  {name:"Cover Drivers", person:"Kevin", email:"kevintalati@gmail.com", phone:"919757095258"},
  {name:"Solo Super Kings", person:"Prashant", email:"prashant.tayde.7@gmail.com", phone:"919049302500"},
  {name:"MI Chya Gaavaat", person:"Sachin", email:"sachinnayak16@gmail.com", phone:"919892355758"}
];

let players = [];

async function loadData(){
  try{
    const res = await fetch("./data.json");
    const data = await res.json();

    players = Object.entries(data.playerPoints["Match 1"] || {});
    players.sort((a,b)=>b[1]-a[1]);

    render();
  }catch(e){
    document.getElementById("leaderboard").innerHTML = "Error loading data.json";
  }
}

function render(){
  let html = "<table><tr><th>Player</th><th>Points</th></tr>";
  players.forEach(p=>{
    html += `<tr><td>${p[0]}</td><td>${p[1]}</td></tr>`;
  });
  html += "</table>";
  document.getElementById("leaderboard").innerHTML = html;
}

function generateMsg(owner, rank){
  return `🔥 ${owner.person} bhai!

${owner.name}

Rank: ${rank}

Aaj ka match dekh ke lag raha hai comeback ya collapse dono possible 😆

Game on!`;
}

function runUpdate(){
  let waHTML = "<h2>📲 WhatsApp Panel</h2>";

  OWNERS.forEach((o,i)=>{
    const rank = i+1;
    const msg = generateMsg(o,rank);

    emailjs.send("service_sg36yti","template_lyyr11w",{
      to_email:o.email,
      message:msg
    });

    const link = `https://wa.me/${o.phone}?text=${encodeURIComponent(msg)}`;

    waHTML += `<div class='card'>
      <b>${o.name}</b><br>
      <a href="${link}" target="_blank">Send WhatsApp</a>
    </div>`;
  });

  document.getElementById("whatsapp").innerHTML = waHTML;
}

loadData();
</script>

</body>
</html>
